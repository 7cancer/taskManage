name: Update release ZIP

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'release/taskManage-build.zip'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  rebuild-and-commit-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build release zip
        run: npm run build:zip

      - name: Commit updated zip
        run: |
          if git diff --quiet -- release/taskManage-build.zip; then
            echo "No changes in release/taskManage-build.zip"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add release/taskManage-build.zip
          git commit -m "chore: update release/taskManage-build.zip"
          git push
