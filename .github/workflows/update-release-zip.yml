name: Update and publish release ZIP

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'release/taskManage-build.zip'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build-commit-and-publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Build release zip
        run: npm run build:zip

      - name: Read app version
        id: app_version
        run: echo "tag=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "chore: update release/taskManage-build.zip"
          git push

      - name: Read app version
        id: app_version
        run: |
          node -e "const p=require('./package.json'); console.log('tag=' + p.version)" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.app_version.outputs.tag }}
          name: ${{ steps.app_version.outputs.tag }}
          files: release/taskManage-build.zip
          fail_on_unmatched_files: true
