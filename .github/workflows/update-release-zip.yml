name: Update and publish release ZIP

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - 'release/taskManage-build.zip'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build-commit-and-publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Build release zip
        run: npm run build:zip

      - name: Commit updated zip
        if: github.ref == 'refs/heads/main'
        run: |
          git add release/taskManage-build.zip

          if git diff --cached --quiet -- release/taskManage-build.zip; then
            echo "No changes in release/taskManage-build.zip"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "chore: update release/taskManage-build.zip"
          git push

      - name: Determine next version tag
        if: github.ref == 'refs/heads/main'
        id: next_version
        run: |
          git fetch --tags
          # Get the latest tag sorted by version number
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            # No existing tags — start from package.json version
            BASE_VERSION=$(node -e "const p=require('./package.json'); console.log(p.version)")
            NEXT_TAG="v${BASE_VERSION}"
          else
            # Increment patch version
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEXT_PATCH=$((PATCH + 1))
            NEXT_TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
          fi
          echo "tag=${NEXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "Next release tag: ${NEXT_TAG}"

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_version.outputs.tag }}
          name: Release ${{ steps.next_version.outputs.tag }}
          files: release/taskManage-build.zip
          fail_on_unmatched_files: true
